services:
  # ─── Application ────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_APP_NAME: "Gopikrishna AI Security"
    container_name: gopikrishna-ai-app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/gopikrishna_ai_security?schema=public
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_GITHUB_ID=${AUTH_GITHUB_ID}
      - AUTH_GITHUB_SECRET=${AUTH_GITHUB_SECRET}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network
    volumes:
      - ./content:/app/content:ro  # Mount blog content

  # ─── Database ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: gopikrishna-ai-db
    environment:
      POSTGRES_DB: gopikrishna_ai_security
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "54321:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  # ─── Database migrations (run once) ─────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gopikrishna-ai-migrate
    command: sh -c "npx prisma migrate deploy"
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/gopikrishna_ai_security?schema=public
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: "no"

volumes:
  postgres_data:
    driver: local

networks:
  app-network:
    driver: bridge
